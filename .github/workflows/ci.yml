name: ci

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "packages/docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths-ignore:
      - "packages/docs/**"
      - ".github/workflows/docs.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - run: nix develop --command pnpm install --frozen-lockfile
      - run: nix develop --command pnpm -C packages/cli check
      - run: nix develop --command pnpm -C packages/cli test
      - name: Build smoke test
        run: nix develop --command bash -c 'pnpm -C packages/cli build && ./gh-vibe --version'
